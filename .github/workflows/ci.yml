name: Expo CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: expo-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Expo App
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Expo dependency versions
        run: npm run expo:check

      - name: Typecheck
        run: npm run typecheck

      - name: Export web bundle
        run: npm run export:web
