name: Feature Request
description: 새 기능, 개선 사항, UX 변경을 제안합니다.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 이 기능이 왜 필요한지, 어떤 불편을 해결하는지 적어주세요.
      placeholder: 예) 사용자가 교정 제안을 하나씩 선택해서 적용할 수 없습니다.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안하는 해결책
      description: 원하는 동작이나 화면 흐름을 구체적으로 적어주세요.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 관련 영역
      options:
        - 교정 엔진
        - 앱 UI
        - Expo 개발 환경
        - iOS 키보드 확장
        - Android 키보드 서비스
        - 문서/운영
        - 기타
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안
      description: 고려한 다른 방식이 있다면 적어주세요.

  - type: textarea
    id: acceptance
    attributes:
      label: 완료 기준
      description: 이 기능이 완료되었다고 판단할 수 있는 조건을 적어주세요.
      placeholder: |
        - 사용자가 제안 목록에서 항목을 선택할 수 있다.
        - 선택한 제안만 원문에 반영된다.
        - iOS/Android에서 동일하게 동작한다.

  - type: textarea
    id: extra
    attributes:
      label: 추가 정보
      description: 참고 자료, 스크린샷, 유사 앱 사례가 있으면 첨부해주세요.
